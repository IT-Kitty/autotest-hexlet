name: Test and sync main

on:
  push:
    branches:
      - source
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  sync-main:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare main branch content
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/main; then
            git worktree add ../main-worktree -B main origin/main
          else
            git worktree add ../main-worktree -B main HEAD
          fi
          node scripts/sync-main.mjs --target ../main-worktree

      - name: Commit and push main
        working-directory: ../main-worktree
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "chore: sync main without solution"
          git push origin HEAD:main --force
